<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI Репетитор</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 16px;
            background: #f5f7fa;
            color: #0f172a;
        }
        .container { max-width: 760px; margin: 0 auto; }
        h1 { font-size: 1.8rem; text-align: center; margin-bottom: 8px; }
        .sub { text-align: center; color: #475569; margin-bottom: 24px; }
        .card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(15, 23, 42, 0.06);
        }
        .action-buttons, .purchase-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 12px 18px;
            border-radius: 999px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button.primary {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }
        button.warning {
            background: #f59e0b;
            color: white;
            border-color: #f59e0b;
        }
        button.secondary {
            background: #e2e8f0;
            border-color: #e2e8f0;
        }
        button:disabled {
            opacity: .6;
            cursor: not-allowed;
        }
        textarea {
            width: 100%;
            min-height: 140px;
            padding: 14px;
            font-size: 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 18px;
            resize: vertical;
            margin-bottom: 14px;
            font-family: inherit;
        }
        .hidden { display: none; }
        .loading {
            text-align: center;
            padding: 30px;
            color: #2563eb;
        }
        .info-panel {
            background: #eef2ff;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 16px;
            text-align: center;
            font-size: .95rem;
        }
        .result-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 18px;
            padding: 16px;
            line-height: 1.65;
            white-space: pre-wrap;
            font-size: 1rem;
        }
        .speech-row {
            margin-top: 14px;
            display: flex;
            justify-content: flex-start;
            gap: 10px;
            flex-wrap: wrap;
        }
        .history-item {
            background: #f8fafc;
            border-left: 4px solid #2563eb;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .muted {
            color: #64748b;
            font-size: .9rem;
        }
        #cameraPreview {
            width: 100%;
            max-height: 320px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 12px;
            background: #000;
            display: none;
        }
        #cameraControls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📚 AI Репетитор</h1>
    <div class="sub">Объясняем задачи просто, спокойно и по смыслу</div>

    <div id="infoPanel" class="info-panel"></div>

    <div class="card">
        <div class="action-buttons">
            <button id="cameraBtn">📷 Фото</button>
            <button id="uploadBtn">🖼️ Загрузить фото</button>
            <button id="textBtn">⌨️ Ввести текст</button>
        </div>
    </div>

    <video id="cameraPreview" autoplay playsinline></video>
    <div id="cameraControls" class="hidden">
        <button id="takePhotoBtn" class="primary">📸 Сделать снимок</button>
        <button id="cancelCameraBtn" class="secondary">Отмена</button>
    </div>
    <canvas id="photoCanvas" style="display:none;"></canvas>
    <input type="file" id="uploadFile" accept="image/*" style="display:none;">

    <div id="inputBlock" class="card hidden">
        <textarea id="taskText" placeholder="Введите текст задачи"></textarea>
        <button id="solveBtn" class="primary">✅ Решить задачу</button>
    </div>

    <div id="explanationBlock" class="card hidden">
        <div id="explanationContent"></div>
        <div class="speech-row">
            <button id="speakBtn" class="secondary">🔊 Озвучить</button>
            <button id="copyBtn" class="secondary">📋 Скопировать</button>
        </div>
    </div>

    <div class="card">
        <div class="purchase-buttons">
            <button id="buyPackBtn" class="warning">💎 Купить 10 объяснений</button>
            <button id="subscribeBtn" class="primary">📅 Подписка на месяц</button>
        </div>
    </div>

    <div id="historyBlock" class="card">
        <h3>📜 История решений</h3>
        <div id="historyList"></div>
        <button id="clearHistoryBtn" class="secondary" style="margin-top:8px;">Очистить историю</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.js"></script>
<script>
    const PROXY_URL = "https://wolandvp-beep-ai-math-1-4-8e2f.twc1.net";
    const TRIAL_LIMIT = 10;
    const MAX_IMAGE_SIDE = 1024;
    const IMAGE_QUALITY = 0.85;

    function getState() {
        const defaults = {
            totalExplanationsUsed: 0,
            paidCredits: 0,
            subscriptionActive: false,
            subscriptionExpiry: null
        };
        try {
            const saved = JSON.parse(localStorage.getItem('appState') || '{}');
            return { ...defaults, ...saved };
        } catch {
            return defaults;
        }
    }

    function saveState(state) {
        localStorage.setItem('appState', JSON.stringify(state));
    }

    function getTodayKey() {
        return new Date().toISOString().slice(0, 10);
    }

    function getDailyUsedCount() {
        return Number(localStorage.getItem('dailyUsage_' + getTodayKey()) || 0);
    }

    function incrementDailyUsed() {
        localStorage.setItem('dailyUsage_' + getTodayKey(), String(getDailyUsedCount() + 1));
    }

    function isSubscriptionValid() {
        const state = getState();
        if (!state.subscriptionActive || !state.subscriptionExpiry) return false;
        return new Date(state.subscriptionExpiry) > new Date();
    }

    function getCredits(state = getState()) {
        const freeLeft = Math.max(0, TRIAL_LIMIT - (state.totalExplanationsUsed || 0));
        const paidLeft = Math.max(0, state.paidCredits || 0);
        return { freeLeft, paidLeft };
    }

    function canMakeRequest() {
        const state = getState();
        if (state.subscriptionActive && isSubscriptionValid()) {
            return getDailyUsedCount() < 10;
        }
        const { freeLeft, paidLeft } = getCredits(state);
        return freeLeft > 0 || paidLeft > 0;
    }

    function decrementAvailable() {
        const state = getState();

        if (state.subscriptionActive && isSubscriptionValid()) {
            incrementDailyUsed();
        } else {
            const { freeLeft } = getCredits(state);
            if (freeLeft <= 0) {
                state.paidCredits = Math.max(0, (state.paidCredits || 0) - 1);
            }
        }

        state.totalExplanationsUsed = (state.totalExplanationsUsed || 0) + 1;
        saveState(state);
    }

    function buyPacket() {
        const state = getState();
        state.paidCredits = (state.paidCredits || 0) + 10;
        saveState(state);
        updateUI();
        alert('Добавлено 10 объяснений.');
    }

    function activateSubscription() {
        const state = getState();
        const expiry = new Date();
        expiry.setMonth(expiry.getMonth() + 1);
        state.subscriptionActive = true;
        state.subscriptionExpiry = expiry.toISOString();
        saveState(state);
        updateUI();
        alert('Подписка активирована на 1 месяц.');
    }

    function updateUI() {
        const state = getState();
        const infoPanel = document.getElementById('infoPanel');

        if (state.subscriptionActive && isSubscriptionValid()) {
            const leftToday = Math.max(0, 10 - getDailyUsedCount());
            infoPanel.innerHTML = `Подписка активна до <b>${new Date(state.subscriptionExpiry).toLocaleDateString()}</b>. Сегодня осталось объяснений: <b>${leftToday}</b>.`;
            return;
        }

        const { freeLeft, paidLeft } = getCredits(state);
        infoPanel.innerHTML = `Бесплатно осталось: <b>${freeLeft}</b>. Купленных объяснений осталось: <b>${paidLeft}</b>.`;
    }

    function normalizeAssistantText(text) {
        if (!text) return '';

        let clean = String(text);

        clean = clean
            .replace(//g, '')
            .replace(/\*\*/g, '')
            .replace(/__/g, '')
            .replace(/`/g, '')
            .replace(/#{1,6}\s*/g, '')
            .replace(/\\(/g, '')
            .replace(/\\)/g, '')
            .replace(/\\[/g, '')
            .replace(/\\]/g, '')
            .replace(/\/g, '')
            .replace(/^\s*\d+[.)]\s*/gm, '')
            .replace(/^\s*Шаг\s*\d+\s*:?\s*/gim, '')
            .replace(/
{3,}/g, '

')
            .trim();

        return clean;
    }

    function normalizeTextForSpeech(text) {
        let clean = normalizeAssistantText(text);

        clean = clean
            .replace(/^\s*Ответ\s*:?\s*/gim, 'Ответ. ')
            .replace(/«/g, '')
            .replace(/»/g, '')
            .replace(/([0-9])\s*\+\s*([0-9])/g, '$1 плюс $2')
            .replace(/([0-9])\s*=\s*([0-9])/g, '$1 равно $2')
            .replace(/([0-9])\s*[-−–—]\s*([0-9])/g, '$1 минус $2')
            .replace(/:/g, '. ')
            .replace(/;/g, '. ')
            .replace(/
{2,}/g, '. ')
            .replace(/
/g, ' ')
            .replace(/\s{2,}/g, ' ')
            .trim();

        return clean;
    }

    function pickBestRussianVoice() {
        if (!window.speechSynthesis) return null;

        const voices = window.speechSynthesis.getVoices() || [];
        const russian = voices.filter(v => (v.lang || '').toLowerCase().startsWith('ru'));
        if (!russian.length) return null;

        const priorities = ['milena', 'yana', 'tatyana', 'oksana', 'оксана', 'алёна', 'alyona', 'irina', 'anna'];
        for (const name of priorities) {
            const found = russian.find(v => (v.name || '').toLowerCase().includes(name));
            if (found) return found;
        }

        return russian.find(v => v.localService) || russian[0];
    }

    function speakText(text) {
        if (!window.speechSynthesis) {
            alert('Ваш браузер не поддерживает озвучку.');
            return;
        }

        const prepared = normalizeTextForSpeech(text);
        if (!prepared) {
            alert('Нет текста для озвучки.');
            return;
        }

        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(prepared);
        utterance.lang = 'ru-RU';
        utterance.rate = 0.82;
        utterance.pitch = 0.95;
        utterance.volume = 1;

        const voice = pickBestRussianVoice();
        if (voice) {
            utterance.voice = voice;
            utterance.lang = voice.lang || 'ru-RU';
        }

        window.speechSynthesis.speak(utterance);
    }

    if (window.speechSynthesis) {
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };
    }

    function resizeImageToDataUrl(source, mimeType = 'image/jpeg', maxSide = MAX_IMAGE_SIDE, quality = IMAGE_QUALITY) {
        const width = source.videoWidth || source.naturalWidth || source.width;
        const height = source.videoHeight || source.naturalHeight || source.height;

        if (!width || !height) {
            throw new Error('Не удалось определить размер изображения.');
        }

        let targetWidth = width;
        let targetHeight = height;
        const biggerSide = Math.max(width, height);

        if (biggerSide > maxSide) {
            const scale = maxSide / biggerSide;
            targetWidth = Math.round(width * scale);
            targetHeight = Math.round(height * scale);
        }

        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = targetWidth;
        tempCanvas.height = targetHeight;

        const ctx = tempCanvas.getContext('2d');
        ctx.drawImage(source, 0, 0, targetWidth, targetHeight);

        return tempCanvas.toDataURL(mimeType, quality);
    }

    function fileToResizedDataUrl(file, maxSide = MAX_IMAGE_SIDE, quality = IMAGE_QUALITY) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();

            reader.onerror = () => reject(new Error('Не удалось прочитать файл.'));

            reader.onload = () => {
                const img = new Image();

                img.onerror = () => reject(new Error('Не удалось загрузить изображение.'));
                img.onload = () => {
                    try {
                        const resized = resizeImageToDataUrl(img, 'image/jpeg', maxSide, quality);
                        resolve(resized);
                    } catch (error) {
                        reject(error);
                    }
                };

                img.src = reader.result;
            };

            reader.readAsDataURL(file);
        });
    }

    const db = new Dexie('AITutorDB');
    db.version(1).stores({ history: '++id, timestamp, taskText, explanationText' });

    const cameraBtn = document.getElementById('cameraBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const textBtn = document.getElementById('textBtn');
    const inputBlock = document.getElementById('inputBlock');
    const taskTextarea = document.getElementById('taskText');
    const solveBtn = document.getElementById('solveBtn');
    const explanationBlock = document.getElementById('explanationBlock');
    const explanationContent = document.getElementById('explanationContent');
    const speakBtn = document.getElementById('speakBtn');
    const copyBtn = document.getElementById('copyBtn');
    const historyList = document.getElementById('historyList');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const buyPackBtn = document.getElementById('buyPackBtn');
    const subscribeBtn = document.getElementById('subscribeBtn');
    const video = document.getElementById('cameraPreview');
    const fileInput = document.getElementById('uploadFile');
    const cameraControls = document.getElementById('cameraControls');
    const takePhotoBtn = document.getElementById('takePhotoBtn');
    const cancelCameraBtn = document.getElementById('cancelCameraBtn');

    let currentExplanationText = '';
    let cameraStream = null;

    async function callProxy(action, payload) {
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 60000);

            const response = await fetch(PROXY_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, ...payload }),
                signal: controller.signal
            });

            clearTimeout(timeoutId);
            const rawText = await response.text();

            let data;
            try {
                data = JSON.parse(rawText);
            } catch {
                throw new Error('Сервер вернул непонятный ответ.');
            }

            if (!response.ok) {
                throw new Error(data.error || `HTTP ${response.status}`);
            }

            if (data.error) {
                throw new Error(data.error);
            }

            if (typeof data.result !== 'string') {
                throw new Error('Прокси вернул неожиданный ответ.');
            }

            return data.result;
        } catch (err) {
            if (err.name === 'AbortError') {
                throw new Error('Сервер отвечает слишком долго. Попробуйте ещё раз.');
            }
            throw err;
        }
    }

    async function explainTask(text) {
        return callProxy('explain', { text });
    }

    async function explainImage(imageDataUrl) {
        return callProxy('explain_image', { image: imageDataUrl });
    }

    function escapeHtml(str) {
        return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    function renderExplanation(text) {
        const normalized = normalizeAssistantText(text);
        currentExplanationText = normalized;

        const html = escapeHtml(normalized)
            .replace(/

/g, '</p><p>')
            .replace(/
/g, '<br>');

        explanationContent.innerHTML = `<div class="result-box"><p style="margin:0;">${html}</p></div>`;
        explanationBlock.classList.remove('hidden');
    }

    async function saveToHistory(task, explanation) {
        await db.history.add({
            timestamp: new Date().toISOString(),
            taskText: task,
            explanationText: explanation
        });
        renderHistory();
    }

    async function renderHistory() {
        const items = await db.history.reverse().limit(20).toArray();
        if (!items.length) {
            historyList.innerHTML = '<div class="muted">Пока ничего нет</div>';
            return;
        }

        historyList.innerHTML = items.map(item => {
            const taskText = String(item.taskText || '');
            const answerClean = normalizeAssistantText(item.explanationText || '');
            const taskPreview = escapeHtml(taskText.substring(0, 140)) + (taskText.length > 140 ? '…' : '');
            const answerPreview = escapeHtml(answerClean.substring(0, 180)) + (answerClean.length > 180 ? '…' : '');
            return `
                <div class="history-item">
                    <div><b>Задача:</b> ${taskPreview}</div>
                    <div style="margin-top:6px;"><b>Ответ:</b> ${answerPreview}</div>
                    <div class="muted" style="margin-top:6px;">${new Date(item.timestamp).toLocaleString()}</div>
                </div>
            `;
        }).join('');
    }

    async function processTask(taskText) {
        if (!canMakeRequest()) {
            alert('Недостаточно объяснений. Приобретите пакет или оформите подписку.');
            return;
        }

        const cleanedTask = String(taskText || '').trim();
        if (!cleanedTask) {
            alert('Введите текст задачи.');
            return;
        }

        explanationBlock.classList.remove('hidden');
        explanationContent.innerHTML = '<div class="loading">🤖 Думаю...</div>';

        try {
            const explanation = normalizeAssistantText(await explainTask(cleanedTask));
            renderExplanation(explanation);
            await saveToHistory(cleanedTask, explanation);
            decrementAvailable();
            updateUI();
        } catch (err) {
            explanationBlock.classList.add('hidden');
            alert('Ошибка: ' + err.message);
        }
    }

    async function processImage(imageDataUrl) {
        if (!canMakeRequest()) {
            alert('Недостаточно объяснений. Приобретите пакет или оформите подписку.');
            return;
        }

        explanationBlock.classList.remove('hidden');
        explanationContent.innerHTML = '<div class="loading">🤖 Анализирую фото и готовлю объяснение...</div>';

        try {
            const explanation = normalizeAssistantText(await explainImage(imageDataUrl));
            renderExplanation(explanation);
            await saveToHistory('[Фото]', explanation);
            decrementAvailable();
            updateUI();
        } catch (err) {
            explanationBlock.classList.add('hidden');
            alert('Ошибка при обработке фото: ' + err.message);
        }
    }

    function stopCamera() {
        if (cameraStream) {
            cameraStream.getTracks().forEach(track => track.stop());
            cameraStream = null;
        }
        video.style.display = 'none';
        cameraControls.classList.add('hidden');
    }

    cameraBtn.onclick = async () => {
        if (!canMakeRequest()) {
            alert('Недостаточно объяснений. Приобретите пакет или оформите подписку.');
            return;
        }

        try {
            stopCamera();
            cameraStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment' }
            });
            video.srcObject = cameraStream;
            video.style.display = 'block';
            cameraControls.classList.remove('hidden');
        } catch (err) {
            console.error('Camera error:', err);
            alert('Не удалось получить доступ к камере. Попробуйте загрузить фото файлом.');
        }
    };

    takePhotoBtn.onclick = () => {
        if (!video.videoWidth || !video.videoHeight) {
            alert('Камера ещё не готова. Попробуйте ещё раз.');
            return;
        }

        try {
            const imageDataUrl = resizeImageToDataUrl(video, 'image/jpeg', MAX_IMAGE_SIDE, IMAGE_QUALITY);
            stopCamera();
            processImage(imageDataUrl);
        } catch (err) {
            stopCamera();
            alert('Не удалось подготовить фото: ' + err.message);
        }
    };

    cancelCameraBtn.onclick = () => {
        stopCamera();
    };

    uploadBtn.onclick = () => {
        if (!canMakeRequest()) {
            alert('Недостаточно объяснений. Приобретите пакет или оформите подписку.');
            return;
        }
        fileInput.click();
    };

    fileInput.onchange = async (e) => {
        const file = e.target.files && e.target.files[0];
        fileInput.value = '';

        if (!file) return;

        try {
            const imageDataUrl = await fileToResizedDataUrl(file, MAX_IMAGE_SIDE, IMAGE_QUALITY);
            processImage(imageDataUrl);
        } catch (err) {
            alert('Не удалось подготовить изображение: ' + err.message);
        }
    };

    textBtn.onclick = () => {
        if (!canMakeRequest()) {
            alert('Недостаточно объяснений. Приобретите пакет или оформите подписку.');
            return;
        }
        inputBlock.classList.remove('hidden');
        taskTextarea.focus();
    };

    solveBtn.onclick = () => {
        processTask(taskTextarea.value);
    };

    taskTextarea.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            processTask(taskTextarea.value);
        }
    });

    speakBtn.onclick = () => {
        speakText(currentExplanationText);
    };

    copyBtn.onclick = async () => {
        if (!currentExplanationText) {
            alert('Пока нет текста для копирования.');
            return;
        }
        try {
            await navigator.clipboard.writeText(currentExplanationText);
            alert('Текст скопирован.');
        } catch {
            alert('Не удалось скопировать текст.');
        }
    };

    clearHistoryBtn.onclick = async () => {
        if (!confirm('Очистить историю решений?')) return;
        await db.history.clear();
        renderHistory();
    };

    buyPackBtn.onclick = buyPacket;
    subscribeBtn.onclick = activateSubscription;

    renderHistory();
    updateUI();
</script>
</body>
</html>
