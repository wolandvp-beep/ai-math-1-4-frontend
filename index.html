<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI Репетитор</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 16px;
            background: #f5f7fa;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 1.6rem; text-align: center; margin-bottom: 8px; }
        .sub { text-align: center; color: #475569; margin-bottom: 24px; }
        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        button {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
        }
        button.primary {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }
        button.primary:disabled {
            background: #94a3b8;
            border-color: #94a3b8;
            cursor: not-allowed;
        }
        button.warning {
            background: #f59e0b;
            border-color: #f59e0b;
            color: white;
        }
        button.speak-btn {
            background: #e2e8f0;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-top: 12px;
            display: inline-block;
        }
        textarea {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            font-family: inherit;
            margin-bottom: 16px;
            min-height: 110px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -2px rgba(0,0,0,0.05);
        }
        .step {
            background: #f1f5f9;
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            white-space: pre-wrap;
        }
        .hidden { display: none; }
        .loading { text-align: center; padding: 40px; color: #3b82f6; }
        .history-item {
            background: #f8fafc;
            border-left: 4px solid #3b82f6;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 12px;
        }
        .nav-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 16px;
        }
        .info-panel {
            background: #eef2ff;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 0.95rem;
            white-space: pre-line;
        }
        .purchase-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 12px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📚 AI Репетитор</h1>
    <div class="sub">Помогаем с домашними заданиями</div>

    <div id="infoPanel" class="info-panel"></div>

    <div class="action-buttons">
        <button id="cameraBtn">📷 Фото</button>
        <button id="textBtn">⌨️ Ввести текст</button>
    </div>

    <div id="inputBlock" class="card hidden">
        <textarea id="taskText" rows="3" placeholder="Введите текст задачи или отредактируйте распознанный..."></textarea>
        <button id="solveBtn" class="primary">✅ Решить задачу</button>
    </div>

    <div id="explanationBlock" class="card hidden">
        <div id="explanationContent"></div>
        <div class="nav-buttons">
            <button id="prevStepBtn" class="hidden">◀ Назад</button>
            <button id="nextStepBtn" class="primary">Дальше ▶</button>
        </div>
    </div>

    <div class="card">
        <div class="purchase-buttons">
            <button id="buyPackBtn" class="warning">💎 Купить 10 объяснений</button>
            <button id="subscribeBtn" class="primary">📅 Подписка на месяц</button>
        </div>
    </div>

    <div id="historyBlock" class="card">
        <h3>📜 История решений</h3>
        <div id="historyList"></div>
        <button id="clearHistoryBtn" style="margin-top:8px; background:#fee2e2;">Очистить историю</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.js"></script>
<script>
    const PROXY_URL = "https://wolandvp-beep-ai-math-1-4-8e2f.twc1.net";
    const TRIAL_LIMIT = 10;
    const SUBSCRIPTION_DAILY_LIMIT = 10;
    const REQUEST_TIMEOUT_MS = 60000;

    function getState() {
        const defaultState = {
            totalExplanationsUsed: 0,
            freeUsed: 0,
            paidCredits: 0,
            subscriptionActive: false,
            subscriptionExpiry: null
        };

        const saved = localStorage.getItem('appState');
        if (!saved) return defaultState;

        try {
            const parsed = JSON.parse(saved);
            const migrated = { ...defaultState, ...parsed };

            if (typeof migrated.paidCredits !== 'number') {
                migrated.paidCredits = 0;
            }

            if (typeof parsed.purchasedPackets === 'number' && migrated.paidCredits === 0) {
                migrated.paidCredits = parsed.purchasedPackets * 10;
            }

            if (typeof migrated.freeUsed !== 'number') {
                migrated.freeUsed = Math.min(TRIAL_LIMIT, migrated.totalExplanationsUsed || 0);
            }

            migrated.freeUsed = Math.max(0, Math.min(TRIAL_LIMIT, migrated.freeUsed));
            migrated.paidCredits = Math.max(0, migrated.paidCredits);

            return migrated;
        } catch (e) {
            return defaultState;
        }
    }

    function saveState(state) {
        localStorage.setItem('appState', JSON.stringify(state));
    }

    function getDailyUsedCount() {
        const today = new Date().toISOString().slice(0, 10);
        const dailyKey = `dailyUsed_${today}`;
        const used = localStorage.getItem(dailyKey);
        return used ? parseInt(used, 10) || 0 : 0;
    }

    function incrementDailyUsed() {
        const today = new Date().toISOString().slice(0, 10);
        const dailyKey = `dailyUsed_${today}`;
        const used = getDailyUsedCount() + 1;
        localStorage.setItem(dailyKey, String(used));
        return used;
    }

    function isSubscriptionValid() {
        const state = getState();
        if (!state.subscriptionActive || !state.subscriptionExpiry) return false;
        return new Date(state.subscriptionExpiry) > new Date();
    }

    function getRemainingFree(state) {
        return Math.max(0, TRIAL_LIMIT - (state.freeUsed || 0));
    }

    function getRemainingPaid(state) {
        return Math.max(0, state.paidCredits || 0);
    }

    function canMakeRequest() {
        const state = getState();

        if (state.subscriptionActive && isSubscriptionValid()) {
            return getDailyUsedCount() < SUBSCRIPTION_DAILY_LIMIT;
        }

        return getRemainingFree(state) > 0 || getRemainingPaid(state) > 0;
    }

    function decrementAvailable() {
        const state = getState();

        if (state.subscriptionActive && isSubscriptionValid()) {
            incrementDailyUsed();
        } else if (getRemainingFree(state) > 0) {
            state.freeUsed += 1;
        } else if (getRemainingPaid(state) > 0) {
            state.paidCredits -= 1;
        } else {
            return;
        }

        state.totalExplanationsUsed = (state.totalExplanationsUsed || 0) + 1;
        saveState(state);
        updateUI();
    }

    function buyPacket() {
        const state = getState();
        state.paidCredits = (state.paidCredits || 0) + 10;
        saveState(state);
        updateUI();
        alert('Добавлено 10 объяснений!');
    }

    function activateSubscription() {
        const state = getState();
        const expiry = new Date();
        expiry.setDate(expiry.getDate() + 30);
        state.subscriptionActive = true;
        state.subscriptionExpiry = expiry.toISOString();
        saveState(state);
        updateUI();
        alert('Подписка активирована на 30 дней. Каждый день доступно 10 объяснений.');
    }

    function updateUI() {
        const state = getState();
        const infoDiv = document.getElementById('infoPanel');
        const solveBtn = document.getElementById('solveBtn');
        const hasActiveSubscription = state.subscriptionActive && isSubscriptionValid();
        const freeLeft = getRemainingFree(state);
        const paidLeft = getRemainingPaid(state);
        const canRequest = canMakeRequest();

        let infoText = '';

        if (hasActiveSubscription) {
            const usedToday = getDailyUsedCount();
            const remainingToday = Math.max(0, SUBSCRIPTION_DAILY_LIMIT - usedToday);
            infoText = `⭐ Подписка активна до ${new Date(state.subscriptionExpiry).toLocaleDateString()}.\nОсталось объяснений на сегодня: ${remainingToday}`;
        } else {
            infoText = `🎁 Бесплатно осталось: ${freeLeft} из ${TRIAL_LIMIT}.\n💎 Купленных объяснений осталось: ${paidLeft}.`;
        }

        if (!hasActiveSubscription && freeLeft === 0 && paidLeft === 0) {
            infoText += `\n🔒 Бесплатный лимит закончился. Чтобы продолжить, купите пакет или оформите подписку.`;
        } else if (hasActiveSubscription && !canRequest) {
            infoText += `\n⚠️ Лимит на сегодня исчерпан. Завтра он обновится.`;
        }

        if (solveBtn) {
            solveBtn.disabled = !canRequest;
        }

        infoDiv.textContent = infoText;
    }

    function speakText(text) {
        if (!window.speechSynthesis) {
            alert("Ваш браузер не поддерживает голосовое озвучивание");
            return;
        }
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ru-RU';
        utterance.rate = 0.9;
        utterance.pitch = 1.1;
        window.speechSynthesis.speak(utterance);
    }

    const db = new Dexie("AITutorDB");
    db.version(1).stores({ history: "++id, timestamp, taskText, explanationText" });

    let currentSteps = [];
    let currentStepIndex = 0;
    let currentTaskText = "";

    const cameraBtn = document.getElementById('cameraBtn');
    const textBtn = document.getElementById('textBtn');
    const inputBlock = document.getElementById('inputBlock');
    const taskTextarea = document.getElementById('taskText');
    const solveBtn = document.getElementById('solveBtn');
    const explanationBlock = document.getElementById('explanationBlock');
    const explanationContent = document.getElementById('explanationContent');
    const prevStepBtn = document.getElementById('prevStepBtn');
    const nextStepBtn = document.getElementById('nextStepBtn');
    const historyList = document.getElementById('historyList');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const buyPackBtn = document.getElementById('buyPackBtn');
    const subscribeBtn = document.getElementById('subscribeBtn');

    async function callProxy(action, payload) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);

        try {
            const res = await fetch(PROXY_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, ...payload }),
                signal: controller.signal
            });

            clearTimeout(timeoutId);

            const rawText = await res.text();
            let data = null;

            try {
                data = rawText ? JSON.parse(rawText) : null;
            } catch (e) {
                data = null;
            }

            if (!res.ok) {
                const message = data && data.error ? data.error : rawText || `HTTP ${res.status}`;
                throw new Error(message);
            }

            if (!data || typeof data.result !== 'string') {
                if (data && typeof data.debug_text === 'string') {
                try {
                    const nested = JSON.parse(data.debug_text);
                    const nestedText = nested?.choices?.[0]?.message?.content;
                    if (typeof nestedText === 'string' && nestedText.trim()) {
                        return nestedText;
                    }
                } catch (e) {
                    // ignore debug fallback parse errors
                }
            }

            throw new Error('Прокси вернул неожиданный ответ.');
            }

            return data.result;
        } catch (err) {
            clearTimeout(timeoutId);

            if (err.name === 'AbortError') {
                throw new Error('Сервер не ответил за 60 секунд. Попробуйте ещё раз.');
            }

            throw err;
        }
    }

    async function recognizeText(imageDataUrl) {
        return await callProxy('ocr', { image: imageDataUrl });
    }

    async function explainTask(text) {
        return await callProxy('explain', { text });
    }

    function parseSteps(text) {
        const lines = text.split('\n').filter(line => line.trim());
        const steps = [];
        let current = '';

        for (const line of lines) {
            if (/^Краткая запись/i.test(line) || /^Шаг \d+/i.test(line) || /^Ответ/i.test(line)) {
                if (current) steps.push(current.trim());
                current = line;
            } else {
                current += (current ? '\n' : '') + line;
            }
        }

        if (current) steps.push(current.trim());
        return steps.length ? steps : [text];
    }

    function escapeHtml(str) {
        return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    function renderSteps() {
        if (!currentSteps.length) return;

        const stepText = currentSteps[currentStepIndex];
        const safeText = escapeHtml(stepText).replace(/\n/g, '<br>');

        explanationContent.innerHTML = `
            <div class="step">
                <div>${safeText}</div>
                <button id="stepSpeakBtn" class="speak-btn">🔊 Озвучить</button>
            </div>
        `;

        const speakBtn = document.getElementById('stepSpeakBtn');
        if (speakBtn) {
            speakBtn.onclick = () => speakText(stepText);
        }

        prevStepBtn.classList.toggle('hidden', currentStepIndex === 0);
        nextStepBtn.textContent = currentStepIndex === currentSteps.length - 1 ? "Завершить" : "Дальше ▶";
    }

    async function saveToHistory(task, explanation) {
        await db.history.add({
            timestamp: new Date().toISOString(),
            taskText: task,
            explanationText: explanation
        });
        await renderHistory();
    }

    async function renderHistory() {
        const items = await db.history.reverse().limit(20).toArray();

        if (!items.length) {
            historyList.innerHTML = '<div style="color:#94a3b8;">Пока ничего нет</div>';
            return;
        }

        historyList.innerHTML = items.map(item => `
            <div class="history-item">
                <div>📖 ${escapeHtml(item.taskText.substring(0, 80))}${item.taskText.length > 80 ? '…' : ''}</div>
                <div style="font-size:0.9rem;color:#334155;">📝 ${escapeHtml(item.explanationText.substring(0, 100))}${item.explanationText.length > 100 ? '…' : ''}</div>
                <div style="font-size:0.75rem;color:#64748b;">${new Date(item.timestamp).toLocaleString()}</div>
            </div>
        `).join('');
    }

    async function processTask(taskText) {
        if (!canMakeRequest()) {
            alert('Недостаточно объяснений. Приобретите пакет или оформите подписку.');
            return;
        }

        currentTaskText = taskText;
        explanationBlock.classList.remove('hidden');
        explanationContent.innerHTML = '<div class="loading">🤖 Думаю...</div>';

        try {
            const explanation = await explainTask(taskText);
            currentSteps = parseSteps(explanation);
            currentStepIndex = 0;
            renderSteps();
            await saveToHistory(taskText, explanation);
            decrementAvailable();
        } catch (err) {
            alert('Ошибка: ' + err.message);
            explanationBlock.classList.add('hidden');
        }
    }

    cameraBtn.onclick = () => {
        if (!canMakeRequest()) {
            alert('Недостаточно объяснений. Приобретите пакет или оформите подписку.');
            return;
        }

        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.capture = 'environment';

        input.onchange = async (e) => {
            const file = e.target.files && e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (ev) => {
                const dataUrl = ev.target.result;
                inputBlock.classList.remove('hidden');
                taskTextarea.value = 'Распознаю...';
                solveBtn.disabled = true;

                try {
                    const recognized = await recognizeText(dataUrl);
                    taskTextarea.value = recognized;
                } catch (err) {
                    taskTextarea.value = '';
                    alert('Ошибка распознавания: ' + err.message + '\n\nМожно нажать "Ввести текст" и вставить задачу вручную.');
                } finally {
                    solveBtn.disabled = !canMakeRequest();
                }
            };

            reader.readAsDataURL(file);
        };

        input.click();
    };

    textBtn.onclick = () => {
        if (!canMakeRequest()) {
            alert('Недостаточно объяснений. Приобретите пакет или оформите подписку.');
            return;
        }

        inputBlock.classList.remove('hidden');
        taskTextarea.value = '';
        taskTextarea.focus();
    };

    solveBtn.onclick = async () => {
        const text = taskTextarea.value.trim();
        if (!text) {
            alert('Введите текст задачи');
            return;
        }
        await processTask(text);
    };

    nextStepBtn.onclick = () => {
        if (currentStepIndex < currentSteps.length - 1) {
            currentStepIndex += 1;
            renderSteps();
        } else {
            explanationBlock.classList.add('hidden');
            inputBlock.classList.remove('hidden');
            taskTextarea.value = currentTaskText;
            currentSteps = [];
        }
    };

    prevStepBtn.onclick = () => {
        if (currentStepIndex > 0) {
            currentStepIndex -= 1;
            renderSteps();
        }
    };

    clearHistoryBtn.onclick = async () => {
        if (confirm('Удалить всю историю?')) {
            await db.history.clear();
            await renderHistory();
        }
    };

    buyPackBtn.onclick = buyPacket;
    subscribeBtn.onclick = activateSubscription;

    updateUI();
    renderHistory();
</script>
</body>
</html>
