<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Репетитор</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f8fafc;
            color: #0f172a;
        }
        .container {
            max-width: 760px;
            margin: 0 auto;
            padding: 24px 16px 40px;
        }
        h1 {
            text-align: center;
            margin: 0 0 8px;
            font-size: 2rem;
        }
        .sub {
            text-align: center;
            color: #475569;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 18px rgba(15, 23, 42, 0.06);
        }
        .info-panel {
            background: #eef2ff;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            font-size: 0.95rem;
            margin-bottom: 16px;
        }
        .action-buttons,
        .purchase-buttons,
        .nav-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            border: none;
            border-radius: 18px;
            padding: 12px 18px;
            font-size: 1rem;
            cursor: pointer;
        }
        button.primary {
            background: #2563eb;
            color: white;
        }
        button.warning {
            background: #f59e0b;
            color: white;
        }
        button.secondary {
            background: #e2e8f0;
            color: #0f172a;
        }
        textarea {
            width: 100%;
            min-height: 110px;
            resize: vertical;
            padding: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 18px;
            font-size: 1rem;
            margin-bottom: 14px;
            font-family: inherit;
        }
        .step {
            background: #f1f5f9;
            padding: 14px 16px;
            border-radius: 16px;
            line-height: 1.5;
        }
        .history-item {
            background: #f8fafc;
            border-left: 4px solid #3b82f6;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 12px;
        }
        .loading {
            text-align: center;
            padding: 28px;
            color: #2563eb;
            font-weight: bold;
        }
        .hidden { display: none; }
        .speak-btn {
            margin-top: 12px;
            background: #e2e8f0;
            color: #0f172a;
            font-size: 0.9rem;
            padding: 8px 14px;
            border-radius: 999px;
        }
        .hint {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📚 AI Репетитор</h1>
    <div class="sub">Помогаем детям 7–10 лет решать задачи шаг за шагом</div>

    <div id="infoPanel" class="info-panel"></div>

    <div class="action-buttons card">
        <button id="cameraBtn" class="secondary">📷 Фото</button>
        <button id="textBtn" class="primary">⌨️ Ввести текст</button>
    </div>

    <div id="inputBlock" class="card hidden">
        <textarea id="taskText" placeholder="Введите текст задачи или вставьте его сюда..."></textarea>
        <button id="solveBtn" class="primary">✅ Решить задачу</button>
        <div class="hint">Если фото не работает, просто вставьте текст задачи вручную.</div>
    </div>

    <div id="explanationBlock" class="card hidden">
        <div id="explanationContent"></div>
        <div class="nav-buttons" style="margin-top:16px;">
            <button id="prevStepBtn" class="secondary hidden">◀ Назад</button>
            <button id="nextStepBtn" class="primary">Дальше ▶</button>
        </div>
    </div>

    <div class="card">
        <div class="purchase-buttons">
            <button id="buyPackBtn" class="warning">💎 Купить 10 объяснений</button>
            <button id="subscribeBtn" class="primary">📅 Подписка на месяц</button>
        </div>
    </div>

    <div id="historyBlock" class="card">
        <h3 style="margin-top:0;">📜 История решений</h3>
        <div id="historyList"></div>
        <button id="clearHistoryBtn" class="secondary" style="margin-top:8px;">Очистить историю</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.js"></script>
<script>
    const PROXY_URL = "https://wolandvp-beep-ai-math-1-4-8e2f.twc1.net";
    const TRIAL_LIMIT = 10;

    function getState() {
        const defaultState = {
            totalExplanationsUsed: 0,
            paidCredits: 0,
            subscriptionActive: false,
            subscriptionExpiry: null
        };
        const saved = localStorage.getItem('appState');
        if (!saved) return defaultState;
        try {
            return { ...defaultState, ...JSON.parse(saved) };
        } catch (e) {
            return defaultState;
        }
    }

    function saveState(state) {
        localStorage.setItem('appState', JSON.stringify(state));
    }

    function isSubscriptionValid() {
        const state = getState();
        if (!state.subscriptionActive || !state.subscriptionExpiry) return false;
        return new Date(state.subscriptionExpiry).getTime() > Date.now();
    }

    function getTodayKey() {
        return new Date().toISOString().slice(0, 10);
    }

    function getDailyUsedCount() {
        const key = 'dailyUsage_' + getTodayKey();
        return parseInt(localStorage.getItem(key) || '0', 10);
    }

    function incrementDailyUsed() {
        const key = 'dailyUsage_' + getTodayKey();
        localStorage.setItem(key, String(getDailyUsedCount() + 1));
    }

    function getCredits(state = getState()) {
        const freeLeft = Math.max(0, TRIAL_LIMIT - (state.totalExplanationsUsed || 0));
        const paidLeft = Math.max(0, state.paidCredits || 0);
        return { freeLeft, paidLeft };
    }

    function canMakeRequest() {
        const state = getState();
        if (state.subscriptionActive && isSubscriptionValid()) {
            return getDailyUsedCount() < 10;
        }
        const { freeLeft, paidLeft } = getCredits(state);
        return freeLeft > 0 || paidLeft > 0;
    }

    function decrementAvailable() {
        const state = getState();
        if (state.subscriptionActive && isSubscriptionValid()) {
            incrementDailyUsed();
        } else {
            const { freeLeft } = getCredits(state);
            if (freeLeft <= 0) {
                state.paidCredits = Math.max(0, (state.paidCredits || 0) - 1);
            }
        }
        state.totalExplanationsUsed = (state.totalExplanationsUsed || 0) + 1;
        saveState(state);
    }

    function buyPacket() {
        const state = getState();
        state.paidCredits = (state.paidCredits || 0) + 10;
        saveState(state);
        updateUI();
        alert('Добавлено 10 объяснений.');
    }

    function activateSubscription() {
        const state = getState();
        const expiry = new Date();
        expiry.setMonth(expiry.getMonth() + 1);
        state.subscriptionActive = true;
        state.subscriptionExpiry = expiry.toISOString();
        saveState(state);
        updateUI();
        alert('Подписка активирована на 1 месяц.');
    }

    function updateUI() {
        const state = getState();
        const infoPanel = document.getElementById('infoPanel');

        if (state.subscriptionActive && isSubscriptionValid()) {
            const leftToday = Math.max(0, 10 - getDailyUsedCount());
            infoPanel.innerHTML = `Подписка активна до <b>${new Date(state.subscriptionExpiry).toLocaleDateString()}</b>. Сегодня осталось объяснений: <b>${leftToday}</b>.`;
            return;
        }

        const { freeLeft, paidLeft } = getCredits(state);
        infoPanel.innerHTML = `Бесплатно осталось: <b>${freeLeft}</b>. Купленных объяснений осталось: <b>${paidLeft}</b>.`;
    }

    function normalizeTextForSpeech(text) {
        if (!text) return '';

        let clean = String(text);

        clean = clean
            .replace(/\r/g, '')
            .replace(/\*\*/g, '')
            .replace(/__/g, '')
            .replace(/`/g, '')
            .replace(/#{1,6}\s*/g, '')
            .replace(/\\\(/g, '')
            .replace(/\\\)/g, '')
            .replace(/\\\[/g, '')
            .replace(/\\\]/g, '')
            .replace(/\\/g, '')
            .replace(/\n+/g, '\n');

        clean = clean
            .replace(/^\s*\d+[\.):]\s*/gm, '')
            .replace(/^\s*Шаг\s*\d+\s*:?\s*/gim, '')
            .replace(/^\s*Ответ\s*:?\s*/gim, 'Ответ. ');

        clean = clean
            .replace(/\+/g, ' плюс ')
            .replace(/=/g, ' равно ')
            .replace(/−|—|–/g, ' минус ')
            .replace(/:/g, '. ')
            .replace(/;/g, '. ');

        clean = clean
            .replace(/\n{2,}/g, '. ')
            .replace(/\n/g, ' ')
            .replace(/\s{2,}/g, ' ')
            .trim();

        const replacements = [
            [/\bУ Пети\b/g, 'У Пети'],
            [/\bПети\b/g, 'Пети'],
            [/\bПетя\b/g, 'Петя'],
            [/\bМаши\b/g, 'Маши'],
            [/\bСаши\b/g, 'Саши'],
            [/\bГриши\b/g, 'Гриши'],
            [/\bещё\b/g, 'еще'],
            [/\bстал[оаи]?\b/gi, 'стало']
        ];

        for (const [pattern, replacement] of replacements) {
            clean = clean.replace(pattern, replacement);
        }

        clean = clean
            .replace(/\s+([,.!?])/g, '$1')
            .replace(/([.!?])(?=[^\s])/g, '$1 ')
            .replace(/\s{2,}/g, ' ')
            .trim();

        return clean;
    }

    function pickBestRussianVoice() {
        if (!window.speechSynthesis) return null;

        const voices = window.speechSynthesis.getVoices() || [];
        if (!voices.length) return null;

        const russianVoices = voices.filter(v => (v.lang || '').toLowerCase().startsWith('ru'));
        if (!russianVoices.length) return null;

        const priorityNames = [
            'milena', 'yana', 'tatyana', 'оксана', 'алёна', 'alyona', 'irina', 'anna'
        ];

        for (const name of priorityNames) {
            const found = russianVoices.find(v => (v.name || '').toLowerCase().includes(name));
            if (found) return found;
        }

        const localVoice = russianVoices.find(v => v.localService);
        return localVoice || russianVoices[0];
    }

    function speakText(text) {
        if (!window.speechSynthesis) {
            alert('Ваш браузер не поддерживает голосовое озвучивание.');
            return;
        }

        const preparedText = normalizeTextForSpeech(text);
        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(preparedText);
        utterance.lang = 'ru-RU';
        utterance.rate = 0.8;
        utterance.pitch = 0.95;
        utterance.volume = 1;

        const bestVoice = pickBestRussianVoice();
        if (bestVoice) {
            utterance.voice = bestVoice;
            utterance.lang = bestVoice.lang || 'ru-RU';
        }

        window.speechSynthesis.speak(utterance);
    }

    if (window.speechSynthesis) {
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };
    }

    const db = new Dexie("AITutorDB");
    db.version(1).stores({ history: "++id, timestamp, taskText, explanationText" });

    let currentSteps = [];
    let currentStepIndex = 0;

    const cameraBtn = document.getElementById('cameraBtn');
    const textBtn = document.getElementById('textBtn');
    const inputBlock = document.getElementById('inputBlock');
    const taskTextarea = document.getElementById('taskText');
    const solveBtn = document.getElementById('solveBtn');
    const explanationBlock = document.getElementById('explanationBlock');
    const explanationContent = document.getElementById('explanationContent');
    const prevStepBtn = document.getElementById('prevStepBtn');
    const nextStepBtn = document.getElementById('nextStepBtn');
    const historyList = document.getElementById('historyList');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const buyPackBtn = document.getElementById('buyPackBtn');
    const subscribeBtn = document.getElementById('subscribeBtn');

    async function callProxy(action, payload) {
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 60000);

            const res = await fetch(PROXY_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, ...payload }),
                signal: controller.signal
            });

            clearTimeout(timeoutId);

            const rawText = await res.text();
            let data;
            try {
                data = JSON.parse(rawText);
            } catch (e) {
                throw new Error(`Сервер вернул не JSON: ${rawText}`);
            }

            if (!res.ok) {
                throw new Error(data.error || `HTTP ${res.status}`);
            }

            if (data.error) {
                throw new Error(data.error);
            }

            if (typeof data.result === 'string') {
                return data.result;
            }

            if (typeof data.debug_text === 'string') {
                throw new Error('Сервер всё ещё работает в диагностическом режиме. Нужно заново обновить main.py на бэкенде.');
            }

            throw new Error('Прокси вернул неожиданный ответ.');
        } catch (err) {
            if (err.name === 'AbortError') {
                throw new Error('Сервер отвечает слишком долго. Попробуйте ещё раз.');
            }
            console.error('Proxy request failed:', err);
            throw err;
        }
    }

    async function explainTask(text) {
        return await callProxy('explain', { text });
    }

    function parseSteps(text) {
        const lines = text.split('\n').filter(l => l.trim());
        const steps = [];
        let cur = '';
        for (let line of lines) {
            if (line.match(/^Краткая запись/i) || line.match(/^Шаг\s*\d+/i) || line.match(/^Ответ/i)) {
                if (cur) steps.push(cur.trim());
                cur = line;
            } else {
                cur += (cur ? '\n' : '') + line;
            }
        }
        if (cur) steps.push(cur.trim());
        return steps.length ? steps : [text];
    }

    function escapeHtml(str) {
        return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    function renderSteps() {
        if (!currentSteps.length) return;
        const stepText = currentSteps[currentStepIndex];
        explanationContent.innerHTML = `
            <div class="step">
                ${escapeHtml(stepText).replace(/\n/g, '<br>')}
                <br>
                <button class="speak-btn" onclick='speakText(${JSON.stringify("${STEP_TEXT_PLACEHOLDER}")})'>🔊 Озвучить</button>
            </div>
        `.replace(JSON.stringify("${STEP_TEXT_PLACEHOLDER}"), JSON.stringify(stepText));
        prevStepBtn.classList.toggle('hidden', currentStepIndex === 0);
        nextStepBtn.textContent = (currentStepIndex === currentSteps.length - 1) ? 'Завершить' : 'Дальше ▶';
    }

    async function saveToHistory(task, explanation) {
        await db.history.add({
            timestamp: new Date().toISOString(),
            taskText: task,
            explanationText: explanation
        });
        renderHistory();
    }

    async function renderHistory() {
        const items = await db.history.reverse().limit(20).toArray();
        if (!items.length) {
            historyList.innerHTML = '<div style="color:#94a3b8;">Пока ничего нет</div>';
            return;
        }
        historyList.innerHTML = items.map(item => `
            <div class="history-item">
                <div><b>📖 Задача:</b> ${escapeHtml(item.taskText.substring(0, 120))}${item.taskText.length > 120 ? '…' : ''}</div>
                <div style="margin-top:6px; color:#334155;"><b>📝 Ответ:</b> ${escapeHtml(item.explanationText.substring(0, 160))}${item.explanationText.length > 160 ? '…' : ''}</div>
                <div style="font-size:0.8rem; color:#64748b; margin-top:6px;">${new Date(item.timestamp).toLocaleString()}</div>
            </div>
        `).join('');
    }

    async function processTask(taskText) {
        if (!canMakeRequest()) {
            alert('Недостаточно объяснений. Приобретите пакет или оформите подписку.');
            return;
        }

        const cleaned = taskText.trim();
        if (!cleaned) {
            alert('Введите текст задачи.');
            return;
        }

        explanationBlock.classList.remove('hidden');
        explanationContent.innerHTML = '<div class="loading">🤖 Думаю...</div>';

        try {
            const explanation = await explainTask(cleaned);
            currentSteps = parseSteps(explanation);
            currentStepIndex = 0;
            renderSteps();
            await saveToHistory(cleaned, explanation);
            decrementAvailable();
            updateUI();
        } catch (err) {
            alert('Ошибка: ' + err.message);
            explanationBlock.classList.add('hidden');
        }
    }

    textBtn.onclick = () => {
        if (!canMakeRequest()) {
            alert('Недостаточно объяснений. Приобретите пакет или оформите подписку.');
            return;
        }
        inputBlock.classList.remove('hidden');
        taskTextarea.focus();
    };

    cameraBtn.onclick = () => {
        alert('Распознавание по фото сейчас временно отключено, чтобы приложение не выдумывало задачу. Нажмите "Ввести текст" и вставьте задачу вручную.');
        inputBlock.classList.remove('hidden');
        taskTextarea.focus();
    };

    solveBtn.onclick = () => processTask(taskTextarea.value);

    taskTextarea.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            processTask(taskTextarea.value);
        }
    });

    prevStepBtn.onclick = () => {
        if (currentStepIndex > 0) {
            currentStepIndex--;
            renderSteps();
        }
    };

    nextStepBtn.onclick = () => {
        if (currentStepIndex < currentSteps.length - 1) {
            currentStepIndex++;
            renderSteps();
        } else {
            explanationBlock.classList.add('hidden');
        }
    };

    clearHistoryBtn.onclick = async () => {
        if (!confirm('Очистить историю решений?')) return;
        await db.history.clear();
        renderHistory();
    };

    buyPackBtn.onclick = buyPacket;
    subscribeBtn.onclick = activateSubscription;

    renderHistory();
    updateUI();
</script>
</body>
</html>
